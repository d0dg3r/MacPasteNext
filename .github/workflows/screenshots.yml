name: Capture macOS Screenshots

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - macOS Release (Self-Signed)
    types:
      - completed

permissions:
  contents: write

jobs:
  capture-screenshots:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Ensure scripts executable
        run: chmod +x scripts/*.sh

      - name: Build app bundle
        env:
          APP_BUNDLE_ID: io.github.joemild.macpastenext
          APP_VERSION: screenshot-${{ github.sha }}
        run: ./scripts/build-release.sh

      - name: Capture dark/light screenshots
        run: ./scripts/capture-screenshots-macos.sh dist/MacPasteNext.app assets

      - name: Upload screenshot artifacts
        uses: actions/upload-artifact@v5
        with:
          name: MacPasteNext-screenshots
          path: |
            assets/screenshot-dark.png
            assets/screenshot-light.png

      - name: Commit updated screenshots to repository
        run: |
          if git diff --quiet -- assets/screenshot-dark.png assets/screenshot-light.png; then
            echo "No screenshot changes detected."
            exit 0
          fi
          if [ -z "${TARGET_BRANCH:-}" ]; then
            echo "Skipping push because TARGET_BRANCH could not be determined."
            exit 0
          fi
          git add assets/screenshot-dark.png assets/screenshot-light.png
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore: update generated app screenshots"
          if ! git push origin "HEAD:${TARGET_BRANCH}"; then
            echo "Failed to push generated screenshots to '${TARGET_BRANCH}'."
            echo "Check branch protection rules and workflow write permissions (contents: write)."
            exit 1
          fi
