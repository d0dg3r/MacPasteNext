<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="1" />
      <stop offset="80%" stop-color="#00ffcc" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="500" height="500" fill="url(#bg)" rx="25" />

  <text x="250" y="70" font-family="Arial Black, Impact, sans-serif" font-size="46" fill="#e94560" text-anchor="middle" font-weight="900">MacPasteNext</text>
  <text x="250" y="100" font-family="monospace" font-size="14" fill="#00ffcc" text-anchor="middle" letter-spacing="3">BY JOE MILD " EST. 2026</text>

  <g transform="translate(90, 360) rotate(-12)">
    <polygon points="0,0 130,-20 130,40 0,60" fill="#d3d6db" stroke="#555" stroke-width="4" />
    <rect x="20" y="10" width="20" height="20" fill="#fff" rx="3" />
    <rect x="50" y="5" width="20" height="20" fill="#fff" rx="3" />
    <rect x="80" y="0" width="20" height="20" fill="#fff" rx="3" />
    <rect x="25" y="40" width="30" height="15" fill="#fff" rx="3" />
    <text x="40" y="52" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">cmd</text>
  </g>

  <g transform="translate(280, 310) rotate(18)">
    <polygon points="0,0 150,15 130,60 -20,40" fill="#d3d6db" stroke="#555" stroke-width="4" />
    <rect x="20" y="15" width="20" height="20" fill="#fff" rx="3" />
    <rect x="50" y="18" width="20" height="20" fill="#fff" rx="3" />
    <rect x="80" y="21" width="20" height="20" fill="#fff" rx="3" />
    <text x="100" y="50" font-family="monospace" font-size="14" fill="#e94560" text-anchor="middle" text-decoration="line-through">V</text>
  </g>

  <path d="M 230 360 L 250 290 L 270 360 L 340 330 L 290 390 L 330 460 L 250 420 L 170 460 L 210 390 L 160 330 Z" fill="#e94560" opacity="0.6" />

  <g transform="translate(250, 230)">
    <rect x="-60" y="-80" width="120" height="180" rx="60" fill="#222" stroke="#555" stroke-width="6"/>
    <path d="M -60 0 C -60 -80 60 -80 60 0" fill="#333" />
    <line x1="0" y1="-80" x2="0" y2="20" stroke="#111" stroke-width="5" />
    <circle cx="0" cy="-35" r="45" fill="url(#glow)" />
    <rect x="-10" y="-55" width="20" height="40" rx="8" fill="#fff" stroke="#000" stroke-width="2" />
    <line x1="-8" y1="-45" x2="8" y2="-45" stroke="#555" stroke-width="2" />
    <line x1="-8" y1="-35" x2="8" y2="-35" stroke="#555" stroke-width="2" />
    <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#555" stroke-width="2" />
  </g>

  <text x="250" y="470" font-family="sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle" font-style="italic">Because middle-click just makes sense.</text>
</svg>
